{% extends 'base.html' %}

{% block title %}Update Employee{% endblock %}
{% block link %}<a href="{% url 'employeelist' %}">Employee List</a>{% endblock link %}

{% block content %}
<div class="form-card">
    <h1>Update Employee</h1>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <input type="submit" value="Update Employee" class="btn btn-primary">
            <a href="{% url 'employeelist' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
