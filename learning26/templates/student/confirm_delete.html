{% extends "base.html" %}

{% block title %}Delete Service{% endblock %}

{% block content %}
<div class="form-card">
    <h1>Delete Service</h1>
    <p class="service-description">Are you sure you want to delete "{{ service.servicename }}"?</p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'servicelist' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
